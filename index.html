<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Papyrus Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Papyrus Library</h1>
  </header>

  <!-- Search -->
  <section id="search-section">
    <input type="text" id="search-input" placeholder="Search books by title or author...">
  </section>

  <!-- Add Book Form -->
  <section id="add-book-section">
    <form id="book-form">
      <input type="text" id="title" placeholder="Title" required>
      <input type="text" id="author" placeholder="Author" required>
      <select id="status">
        <option value="want">Want to Read</option>
        <option value="reading">Currently Reading</option>
        <option value="finished">Finished</option>
      </select>
      <button type="submit">Add Book</button>
    </form>
  </section>

  <!-- Shelves -->
  <section id="library-section">
    <h2>Want to Read</h2>
    <div id="wantShelf" class="shelf"></div>

    <h2>Currently Reading</h2>
    <div id="readingShelf" class="shelf"></div>
