<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Papyrus Library</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Papyrus</h1>
</header>

<!-- SEARCH -->
<section id="search-section">
<input id="search-input" placeholder="Search books...">
<button id="search-button">Search</button>
</section>

<section id="search-results"></section>

<!-- SHELF CREATOR -->
<section id="shelf-manager">
<h3>Custom Shelves</h3>
<input id="new-shelf-name" placeholder="Create shelf">
<button id="create-shelf">Add Shelf</button>
<div id="shelf-list"></div>
</section>

<!-- FILTERS -->
<section id="filters">

<label>Status</label>
<select id="filter-status">
<option value="all">All</option>
<option value="want">Want To Read</option>
<option value="reading">Reading</option>
<option value="finished">Finished</option>
</select>

<label>Shelf</label>
<select id="filter-shelf">
<option value="all">All Shelves</option>
</select>

<label>Sort</label>
<select id="sort-by">
<option value="title">Title</option>
<option value="author">Author</option>
<option value="rating">Rating</option>
</select>

</section>

<!-- LIBRARY GRID -->
<section id="library-grid"></section>

<!-- BOOK MODAL -->
<div id="book-modal" class="modal">

<div class="modal-content">

<span class="close-btn">&times;</span>

<img id="modal-cover">

<h2 id="modal-title"></h2>

<p id="modal-author"></p>

<label>Progress</label>
<input id="modal-progress" type="number">

<label>Review</label>
<textarea id="modal-review"></textarea>

<button id="save-book">Save</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
